version: '3.8'

services:
  bot:
    build: .
    container_name: ac_carrot_bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      # Coolify or manual variables
      - PORT=8000

  dashboard:
    build: ./dashboard
    container_name: ac_carrot_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    depends_on:
      - bot
